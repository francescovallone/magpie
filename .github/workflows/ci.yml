name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit project
        run: npm run test:unit

      - name: Run acceptance project
        run: npm run test:acceptance

      - name: Run full suite with Magpie reporter
        run: npm test

      - name: Upload Magpie reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: magpie-reports
          path: .magpie/reports/
          if-no-files-found: warn