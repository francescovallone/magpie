name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit project
        run: npm run test:unit

      - name: Run acceptance project
        run: npm run test:acceptance

      - name: Run full suite with Magpie reporter
        run: npm test

      - name: Smoke test packed package
        run: |
          npm pack
          mkdir /tmp/pack-smoke && cd /tmp/pack-smoke
          npm init -y
          npm install "$GITHUB_WORKSPACE"/avesbox-magpie-*.tgz vitest
          node -e "import('@avesbox/magpie').then((m) => { if (typeof m.defineAcceptanceScenario !== 'function') throw new Error('bad entry point'); })"
          npx magpie --help

      - name: Upload Magpie reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: magpie-reports
          path: .magpie/reports/
          if-no-files-found: warn
